<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yokonex 炸弹人</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0;}
        :root {
            --bg: #0e141b;
            --panel: rgba(19, 29, 39, 0.94);
            --panel-strong: #101820;
            --ink: #fff5d6;
            --muted: #9fb4c8;
            --line: rgba(255, 245, 214, 0.18);
            --gold: #f6c453;
            --orange: #ff7a35;
            --blue: #63d2ff;
            --danger: #d85656;
            --shadow: 0 18px 48px rgba(0, 0, 0, 0.34), 0 2px 10px rgba(0, 0, 0, 0.28);
        }
        html, body {
            min-height: 100%;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 18% 18%, rgba(99, 210, 255, 0.13), transparent 28%),
                linear-gradient(135deg, #0a0f16 0%, var(--bg) 48%, #121923 100%);
            color: var(--ink);
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
            -webkit-font-smoothing: antialiased;
            font-variant-numeric: tabular-nums;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.22;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        a { color: var(--gold); text-decoration: none; }
        a:hover { color: #ffe28b; }
        input { outline: none; }
        #phaser-example {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            min-height: calc(100vh - 64px);
            overflow-x: hidden;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08), var(--shadow);
        }

        div.menu {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            min-height: 64px;
            background: rgba(8, 13, 19, 0.86);
            color: var(--ink);
            padding: 10px 16px;
            z-index: 30;
            box-shadow: 0 1px 0 rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }
        div.menu > div { margin-bottom: 0; }
        div.menu .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            color: #101820;
            background: var(--gold);
            border-radius: 8px;
            font-weight: 700;
            transition-property: transform, background-color, box-shadow;
            transition-duration: 140ms;
            box-shadow: 0 8px 18px rgba(246, 196, 83, 0.18);
        }
        div.menu .button:active { transform: scale(0.96); }

        .lobby-panel {
            position: fixed;
            inset: 64px 0 0 0;
            display: flex;
            justify-content: center;
            overflow: auto;
            color: var(--ink);
            background:
                linear-gradient(90deg, rgba(14, 20, 27, 0.96), rgba(14, 20, 27, 0.86)),
                radial-gradient(circle at 80% 20%, rgba(99, 210, 255, 0.12), transparent 30%);
            padding: 28px 18px 40px;
            z-index: 18;
        }

        .lobby-panel[hidden] { display: none; }
        .lobby-shell {
            width: min(1040px, 100%);
            display: grid;
            align-content: start;
            gap: 16px;
        }
        .lobby-header {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: end;
        }
        .lobby-header p {
            color: var(--blue);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0;
            margin-bottom: 8px;
        }
        .lobby-panel h2 {
            font-size: 34px;
            line-height: 1.12;
            text-wrap: balance;
        }
        .lobby-tabs {
            display: flex;
            align-self: start;
            align-items: center;
            gap: 8px;
            padding: 6px;
            width: fit-content;
            height: auto;
            background: rgba(7, 12, 18, 0.66);
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
        }
        .lobby-tabs button {
            color: var(--muted);
            background: transparent;
            box-shadow: none;
        }
        .lobby-tabs button.is-active {
            color: #101820;
            background: var(--gold);
            box-shadow: 0 8px 18px rgba(246, 196, 83, 0.18);
        }
        .lobby-view {
            display: grid;
            gap: 14px;
            background: rgba(19, 29, 39, 0.86);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 0 0 1px var(--line), var(--shadow);
            backdrop-filter: blur(10px);
        }
        .lobby-view[hidden] { display: none; }
        .lobby-section-title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }
        .lobby-section-title h3 {
            font-size: 22px;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .lobby-section-title span,
        .room-card span,
        .map-card span {
            color: var(--muted);
            font-size: 13px;
        }
        .result-panel {
            position: absolute;
            top: 118px;
            left: 50%;
            width: 360px;
            transform: translateX(-50%);
            color: var(--ink);
            background: var(--panel);
            border: 1px solid rgba(246, 196, 83, 0.55);
            border-radius: 16px;
            padding: 18px;
            z-index: 22;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .result-panel[hidden] { display: none; }
        .result-panel h2 { font-size: 24px; margin-bottom: 10px; text-wrap: balance; }
        .result-panel p { color: var(--muted); margin-bottom: 14px; text-wrap: pretty; }
        .result-scoreboard {
            display: grid;
            gap: 8px;
            margin: 0 0 14px;
        }
        .result-rating {
            display: grid;
            gap: 8px;
            margin: 0 0 14px;
        }
        .result-rating span {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 8px;
            align-items: center;
            min-height: 34px;
            padding: 7px 9px;
            color: var(--muted);
            background: rgba(7, 12, 18, 0.5);
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
        }
        .result-rating b {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: left;
        }
        .result-rating strong {
            color: var(--gold);
            font-variant-numeric: tabular-nums;
        }
        .result-rating span.is-down strong {
            color: #ff8b8b;
        }
        .result-rating em {
            color: var(--muted);
            font-size: 12px;
            font-style: normal;
            font-variant-numeric: tabular-nums;
        }
        .result-scoreboard span {
            display: grid;
            grid-template-columns: 32px 1fr auto;
            gap: 8px;
            align-items: center;
            min-height: 38px;
            padding: 7px 9px;
            color: var(--muted);
            background: rgba(7, 12, 18, 0.58);
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
        }
        .result-scoreboard span.is-winner {
            color: var(--ink);
            box-shadow: 0 0 0 1px rgba(246, 196, 83, 0.58), 0 12px 24px rgba(246, 196, 83, 0.12);
        }
        .result-scoreboard i {
            display: grid;
            place-items: center;
            width: 32px;
            height: 32px;
            font-style: normal;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
        }
        .result-scoreboard b {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: left;
        }
        .result-scoreboard strong {
            color: var(--gold);
            font-size: 22px;
            font-variant-numeric: tabular-nums;
        }
        .result-panel button {
            cursor: pointer;
            color: #101820;
            background: var(--gold);
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            min-height: 40px;
            transition-property: transform, background-color, box-shadow;
            transition-duration: 140ms;
        }
        .result-panel button:active { transform: scale(0.96); }
        .match-panel {
            position: fixed;
            inset: 64px 0 0 0;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(0, 0, 0, 0.48);
            z-index: 24;
        }
        .match-card {
            width: min(390px, 100%);
            display: grid;
            gap: 12px;
            padding: 20px;
            color: var(--ink);
            text-align: center;
            background: rgba(19, 29, 39, 0.98);
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(246, 196, 83, 0.46), var(--shadow);
        }
        .match-card p {
            color: var(--blue);
            font-size: 13px;
            font-weight: 800;
        }
        .match-card h2 {
            font-size: 26px;
            line-height: 1.2;
        }
        .match-card span {
            color: var(--muted);
            font-size: 14px;
        }
        .match-card button {
            justify-self: center;
            min-height: 40px;
            padding: 9px 14px;
            color: #101820;
            background: var(--gold);
            border: 0;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition-property: transform, opacity;
            transition-duration: 140ms;
        }
        .match-card button:active { transform: scale(0.96); }
        .powerup-panel {
            position: fixed;
            right: max(18px, env(safe-area-inset-right));
            bottom: calc(112px + env(safe-area-inset-bottom));
            width: min(360px, calc(100vw - 36px));
            color: var(--ink);
            z-index: 19;
            pointer-events: none;
        }
        .powerup-panel[hidden] { display: none; }
        .network-banner {
            position: fixed;
            top: calc(76px + env(safe-area-inset-top));
            right: max(18px, env(safe-area-inset-right));
            display: grid;
            gap: 2px;
            width: min(260px, calc(100vw - 36px));
            padding: 10px 12px;
            color: var(--ink);
            background: rgba(216, 86, 86, 0.92);
            border-radius: 8px;
            z-index: 26;
            box-shadow: 0 16px 34px rgba(0,0,0,0.28);
            backdrop-filter: blur(8px);
            animation: networkEnter 180ms ease-out;
        }
        .network-banner[hidden] { display: none; }
        .network-banner strong {
            font-size: 14px;
            line-height: 1.2;
        }
        .network-banner span {
            color: rgba(255,255,255,0.84);
            font-size: 12px;
            line-height: 1.35;
        }
        @keyframes networkEnter {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .powerup-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 10px;
            background: rgba(7, 12, 18, 0.72);
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 16px 34px rgba(0,0,0,0.28);
            backdrop-filter: blur(8px);
        }
        .powerup-grid span {
            display: grid;
            gap: 3px;
            min-height: 46px;
            align-content: center;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }
        .powerup-grid i {
            display: block;
            font-style: normal;
            font-size: 20px;
            line-height: 1;
            font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Microsoft YaHei", sans-serif;
        }
        .powerup-grid strong {
            color: var(--gold);
            font-size: 18px;
            font-variant-numeric: tabular-nums;
        }
        body.hud-side-rail .powerup-panel {
            top: calc(156px + env(safe-area-inset-top));
            right: max(18px, env(safe-area-inset-right));
            bottom: auto;
            width: 132px;
        }
        body.hud-side-rail .powerup-grid {
            grid-template-columns: 1fr;
            gap: 6px;
            padding: 8px;
        }
        body.hud-side-rail .powerup-grid span {
            grid-template-columns: 24px 1fr auto;
            align-items: center;
            min-height: 40px;
            padding: 6px 8px;
            gap: 6px;
            text-align: left;
            background: rgba(255,255,255,0.06);
            border-radius: 6px;
        }
        body.hud-side-rail .powerup-grid i {
            font-size: 17px;
        }
        body.hud-side-rail .powerup-grid strong {
            font-size: 16px;
        }
        body.hud-side-rail .powerup-toast {
            max-width: 132px;
            margin: 0 0 8px auto;
            text-align: center;
        }
        .powerup-toast {
            width: fit-content;
            max-width: 100%;
            margin: 0 0 10px auto;
            padding: 9px 12px;
            color: #101820;
            background: var(--gold);
            border-radius: 8px;
            font-weight: 800;
            box-shadow: 0 12px 26px rgba(246, 196, 83, 0.2);
        }
        .powerup-toast[hidden] { display: none; }
        .profile-panel {
            position: fixed;
            inset: 64px 0 0 0;
            display: flex;
            justify-content: center;
            overflow: auto;
            padding: 28px 18px 40px;
            color: var(--ink);
            background:
                linear-gradient(90deg, rgba(14, 20, 27, 0.96), rgba(14, 20, 27, 0.88)),
                radial-gradient(circle at 78% 20%, rgba(246, 196, 83, 0.12), transparent 28%);
            z-index: 18;
        }
        .profile-shell {
            width: min(980px, 100%);
            display: grid;
            grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.2fr);
            gap: 16px;
            align-content: start;
        }
        .profile-header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(19, 29, 39, 0.82);
            border-radius: 8px;
            box-shadow: 0 0 0 1px var(--line), var(--shadow);
        }
        .profile-avatar {
            width: 76px;
            height: 76px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            color: #101820;
            font-size: 36px;
            font-weight: 900;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 16px 30px rgba(0,0,0,0.28);
        }
        .profile-header p {
            color: var(--blue);
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .profile-header h2 {
            font-size: 34px;
            line-height: 1.1;
            margin-bottom: 4px;
        }
        .profile-header span,
        .profile-note {
            color: var(--muted);
            font-size: 13px;
        }
        .profile-card {
            display: grid;
            gap: 10px;
            padding: 16px;
            background: rgba(19, 29, 39, 0.9);
            border-radius: 8px;
            box-shadow: 0 0 0 1px var(--line), var(--shadow);
        }
        .profile-card h3 {
            font-size: 22px;
            line-height: 1.2;
        }
        .profile-card label {
            color: var(--muted);
            font-size: 13px;
        }
        .profile-card input[type="text"] {
            width: 100%;
            min-height: 42px;
            color: var(--ink);
            background: rgba(7, 12, 18, 0.72);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 8px;
            padding: 9px 10px;
        }
        .profile-colors {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .profile-color {
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.16);
            transition-property: transform, box-shadow;
            transition-duration: 140ms;
        }
        .profile-color.is-selected {
            box-shadow: 0 0 0 3px var(--gold), 0 10px 20px rgba(246, 196, 83, 0.18);
        }
        .profile-color:active { transform: scale(0.96); }
        .profile-roles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 8px;
        }
        .profile-role {
            display: grid;
            grid-template-columns: 42px 1fr;
            grid-template-rows: auto auto;
            gap: 3px 10px;
            min-height: 74px;
            padding: 10px;
            text-align: left;
            color: var(--ink);
            background: rgba(7, 12, 18, 0.64);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: none;
            transition-property: transform, border-color, background-color, box-shadow;
            transition-duration: 140ms;
        }
        .profile-role i {
            grid-row: 1 / 3;
            display: grid;
            place-items: center;
            width: 42px;
            height: 42px;
            align-self: center;
            font-style: normal;
            font-size: 24px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
        }
        .profile-role strong {
            font-size: 15px;
            line-height: 1.2;
        }
        .profile-role span {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }
        .profile-role.is-selected {
            background: rgba(20, 31, 42, 0.96);
            border-color: var(--gold);
            box-shadow: 0 0 0 1px rgba(246, 196, 83, 0.5), 0 12px 24px rgba(246, 196, 83, 0.1);
        }
        .profile-role:active { transform: scale(0.97); }
        .profile-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .profile-card button {
            cursor: pointer;
            min-height: 40px;
            padding: 9px 12px;
            color: #101820;
            background: var(--gold);
            border: 0;
            border-radius: 8px;
            font-weight: 800;
            transition-property: transform, opacity, background-color;
            transition-duration: 140ms;
        }
        .profile-card button:active { transform: scale(0.96); }
        .profile-card button.secondary {
            color: var(--ink);
            background: #2c3e50;
        }
        .profile-card button.danger {
            color: #fff;
            background: var(--danger);
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
            gap: 10px;
        }
        .profile-stats span {
            display: grid;
            gap: 6px;
            min-height: 76px;
            align-content: center;
            padding: 10px;
            color: var(--muted);
            background: rgba(7, 12, 18, 0.58);
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
        }
        .profile-stats strong {
            color: var(--gold);
            font-size: 26px;
            font-variant-numeric: tabular-nums;
        }
        .auth-panel {
            position: fixed;
            inset: 64px 0 0 0;
            display: grid;
            place-items: start center;
            overflow: auto;
            padding: 44px 18px 40px;
            color: var(--ink);
            background:
                linear-gradient(90deg, rgba(14, 20, 27, 0.96), rgba(14, 20, 27, 0.88)),
                radial-gradient(circle at 78% 18%, rgba(99, 210, 255, 0.12), transparent 28%);
            z-index: 18;
        }
        .auth-card {
            width: min(420px, 100%);
            display: grid;
            gap: 10px;
            padding: 18px;
            background: rgba(19, 29, 39, 0.92);
            border-radius: 8px;
            box-shadow: 0 0 0 1px var(--line), var(--shadow);
        }
        .auth-card p {
            color: var(--blue);
            font-size: 13px;
            font-weight: 900;
        }
        .auth-card h2 {
            font-size: 30px;
            line-height: 1.15;
            text-wrap: balance;
        }
        .auth-card label {
            color: var(--muted);
            font-size: 13px;
        }
        .auth-card input {
            width: 100%;
            min-height: 42px;
            color: var(--ink);
            background: rgba(7, 12, 18, 0.72);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 8px;
            padding: 9px 10px;
        }
        .auth-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .auth-card button {
            min-height: 40px;
            padding: 9px 12px;
            color: #101820;
            background: var(--gold);
            border: 0;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition-property: transform, opacity, background-color;
            transition-duration: 140ms;
        }
        .auth-card button:active { transform: scale(0.96); }
        .auth-card button.secondary {
            color: var(--ink);
            background: #2c3e50;
        }
        .auth-card span {
            min-height: 18px;
            color: var(--muted);
            font-size: 13px;
        }
        .leaderboard-panel {
            position: fixed;
            inset: 64px 0 0 0;
            display: flex;
            justify-content: center;
            overflow: auto;
            padding: 28px 18px 40px;
            color: var(--ink);
            background:
                linear-gradient(90deg, rgba(14, 20, 27, 0.96), rgba(14, 20, 27, 0.88)),
                radial-gradient(circle at 78% 20%, rgba(99, 210, 255, 0.12), transparent 28%);
            z-index: 18;
        }
        .leaderboard-shell {
            width: min(860px, 100%);
            display: grid;
            align-content: start;
            gap: 14px;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: end;
            padding: 16px;
            background: rgba(19, 29, 39, 0.84);
            border-radius: 8px;
            box-shadow: 0 0 0 1px var(--line), var(--shadow);
        }
        .leaderboard-header p {
            color: var(--blue);
            font-size: 13px;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .leaderboard-header h2 {
            font-size: 32px;
            line-height: 1.12;
            text-wrap: balance;
        }
        .leaderboard-header span,
        .leaderboard-note {
            color: var(--muted);
            font-size: 13px;
        }
        .leaderboard-actions {
            display: flex;
            gap: 8px;
        }
        .leaderboard-panel button {
            min-height: 40px;
            padding: 9px 12px;
            color: #101820;
